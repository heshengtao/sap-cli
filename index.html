<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAP CLI Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #1e1f20; --bg-card: #25262a; --bg-input: #1a1b1e;
            --text: #e8e8e8; --text-light: #8a8f9b; --accent: #00c2a8;
            --accent-hover: #00a896; --border: #333538; --danger: #ff5c5c;
            --danger-hover: #e04a4a; --radius: 12px; --shadow: 0 8px 24px rgba(0,0,0,.36);
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font); }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 40px 20px; font-size: 15px; }
        .container { width: 100%; max-width: 680px; background: var(--bg-card); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; }
        .header { background: rgba(0, 0, 0, 0.2); padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header i { font-size: 24px; color: var(--accent); }
        .content { padding: 24px; }
        .alert { background: rgba(0, 194, 168, 0.1); border: 1px solid rgba(0, 194, 168, 0.3); color: #bbf0e8; padding: 14px 18px; border-radius: 8px; margin-bottom: 24px; display: flex; gap: 12px; }
        .row { margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; }
        .label { font-weight: 600; display: block; margin-bottom: 6px; }
        .sub-label { color: var(--text-light); font-size: 13px; }
        .badge { padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }
        .badge.offline { background: #3c3d40; color: #a0a0a0; }
        .badge.online { background: rgba(0, 194, 168, 0.15); color: var(--accent); border: 1px solid rgba(0, 194, 168, 0.3); }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
        .online .dot { box-shadow: 0 0 8px var(--accent); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .input-group { display: flex; gap: 10px; margin-top: 8px; }
        input[type="text"] { flex: 1; background: var(--bg-input); border: 1px solid var(--border); color: var(--text); padding: 10px 16px; border-radius: 8px; }
        .btn { border: none; padding: 10px 18px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-danger { background: var(--danger); color: #fff; }
        .lang-btn { background: #333538; color: #fff; font-size: 12px; padding: 4px 10px; border-radius: 4px; cursor: pointer; border: none; }
        hr { border: 0; border-top: 1px solid var(--border); margin: 24px 0; }
        .action-area { display: flex; justify-content: space-between; align-items: center; background: var(--bg-input); padding: 20px; border-radius: 8px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="header-left">
            <i class="fa-solid fa-terminal"></i>
            <h2 id="t-title">SAP 全局命令行工具</h2>
        </div>
        <button class="lang-btn" onclick="toggleLang()" id="langBtn">English</button>
    </div>
    <div class="content">
        <div class="alert">
            <i class="fa-solid fa-circle-info"></i>
            <div id="t-alert"><strong>终端伴侣</strong><br>启用后可在任意终端使用 sap 命令对话。</div>
        </div>
        <div class="row">
            <div class="col-left">
                <span class="label" id="t-status-label">挂载状态</span>
                <span class="sub-label" id="t-status-desc">决定 sap 命令是否在系统中可用</span>
            </div>
            <div id="cliStatus" class="badge offline"><div class="dot"></div><span>...</span></div>
        </div>
        <div class="row" style="display: block;">
            <span class="label" id="t-url-label">软件通信地址 (Base URL)</span>
            <div class="input-group">
                <input type="text" id="backendUrl">
                <button class="btn btn-outline" id="saveUrlBtn"><i class="fa-solid fa-save"></i> <span id="t-update">更新</span></button>
            </div>
        </div>
        <hr>
        <div class="action-area">
            <div>
                <h4 id="t-reg-title">全局命令注册</h4>
                <p id="t-reg-desc" style="color:var(--text-light); font-size:13px;">点击右侧按钮挂载到环境变量</p>
            </div>
            <button id="toggleBtn" class="btn btn-primary"><i class="fa-solid fa-bolt"></i> <span id="t-toggle-text">挂载 CLI</span></button>
        </div>
    </div>
</div>

<script>
    const i18n = {
        zh: {
            title: "SAP 全局命令行工具 (CLI)", alert: "<strong>终端伴侣</strong><br>启用此功能后，你可以在电脑的任意终端直接使用 <code>sap</code> 命令。",
            statusLabel: "挂载状态", statusDesc: "决定 sap 命令是否在系统中可用", urlLabel: "软件通信地址 (Base URL)",
            update: "更新地址", regTitle: "全局命令注册", regDesc: "将 sap 注册到环境变量中", 
            mounted: "已挂载 (可全局使用)", unmounted: "未挂载", mount: "挂载 CLI", unmount: "卸载 CLI", 
            loading: "处理中...", backendDown: "后端未启动", saveSuccess: "已保存"
        },
        en: {
            title: "SAP Global CLI Tool", alert: "<strong>Terminal Companion</strong><br>Once enabled, use the <code>sap</code> command in any terminal to chat.",
            statusLabel: "Mount Status", statusDesc: "Determines if 'sap' command is available", urlLabel: "Base URL",
            update: "Update URL", regTitle: "Command Registration", regDesc: "Register 'sap' to system environment",
            mounted: "Mounted (Global)", unmounted: "Not Mounted", mount: "Mount CLI", unmount: "Unmount CLI",
            loading: "Processing...", backendDown: "Backend Offline", saveSuccess: "Saved"
        }
    };

    let currentLang = 'zh';
    const pathParts = window.location.pathname.split('/');
    const extId = pathParts.includes('extensions') ? pathParts[pathParts.indexOf('extensions') + 1] : 'sap-cli';
    const apiBase = `/api/extensions/${extId}/node/api`;

    async function toggleLang() {
        currentLang = currentLang === 'zh' ? 'en' : 'zh';
        await fetch(`${apiBase}/settings`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ lang: currentLang }) });
        updateUIStrings();
    }

    function updateUIStrings() {
        const t = i18n[currentLang];
        document.getElementById('t-title').innerText = t.title;
        document.getElementById('t-alert').innerHTML = t.alert;
        document.getElementById('t-status-label').innerText = t.statusLabel;
        document.getElementById('t-status-desc').innerText = t.statusDesc;
        document.getElementById('t-url-label').innerText = t.urlLabel;
        document.getElementById('t-update').innerText = t.update;
        document.getElementById('t-reg-title').innerText = t.regTitle;
        document.getElementById('langBtn').innerText = currentLang === 'zh' ? 'English' : '中文';
        updateStatusUI();
    }

    let isEnabled = false;
    async function fetchStatus() {
        try {
            const res = await fetch(`${apiBase}/status`);
            const data = await res.json();
            currentLang = data.lang || 'zh';
            document.getElementById('backendUrl').value = data.backendUrl || window.location.origin;
            isEnabled = data.cliEnabled;
            updateUIStrings();
        } catch (e) {
            document.getElementById('cliStatus').innerHTML = `<span style="color:var(--danger)">Offline</span>`;
        }
    }

    function updateStatusUI() {
        const t = i18n[currentLang];
        const statusBadge = document.getElementById('cliStatus');
        const toggleBtn = document.getElementById('toggleBtn');
        if (isEnabled) {
            statusBadge.className = 'badge online';
            statusBadge.innerHTML = `<div class="dot"></div><span>${t.mounted}</span>`;
            toggleBtn.className = 'btn btn-danger';
            toggleBtn.innerHTML = `<i class="fa-solid fa-trash-can"></i> ${t.unmount}`;
        } else {
            statusBadge.className = 'badge offline';
            statusBadge.innerHTML = `<div class="dot"></div><span>${t.unmounted}</span>`;
            toggleBtn.className = 'btn btn-primary';
            toggleBtn.innerHTML = `<i class="fa-solid fa-bolt"></i> ${t.mount}`;
        }
    }

    document.getElementById('saveUrlBtn').onclick = async () => {
        const btn = document.getElementById('saveUrlBtn');
        const original = btn.innerHTML;
        await fetch(`${apiBase}/settings`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ backendUrl: document.getElementById('backendUrl').value }) });
        btn.innerText = i18n[currentLang].saveSuccess;
        setTimeout(() => btn.innerHTML = original, 2000);
    };

    document.getElementById('toggleBtn').onclick = async () => {
        const res = await fetch(`${apiBase}/toggle-cli`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ enable: !isEnabled }) });
        const data = await res.json();
        if(data.success) { isEnabled = data.enabled; updateStatusUI(); }
        else alert(data.message);
    };

    fetchStatus();
</script>
</body>
</html>
